name: BuildComponents

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # 构建 gitignored 的前置产物：icons dist（@vaebe/ccui-icons/install
      # 副作用 import）+ theme.scss（style-var 经 @vaebe/ccui-theme/theme @forward）。
      # 全新 checkout 无这两者，组件 tsx / scss 编译会失败。
      - name: Build prerequisites (icons dist + theme.scss)
        run: |
          pnpm --filter @vaebe/ccui-icons build
          pnpm --filter ccui-cli generate:theme

      - name: Run build:components
        run: pnpm --filter ccui-cli build:components
