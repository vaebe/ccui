name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # pnpm install 的 postinstall 会自动 bootstrap 前置产物
      # （icons dist + theme.scss），无需在此单独构建。
      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm --filter @vaebe/ccui test
